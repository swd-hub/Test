<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資の経済計算</title>
<style>
  :root{
    --bg:#0f1720;
    --panel:#16212c;
    --panel2:#1c2b38;
    --line:#2a3b4a;
    --gold:#c9a15a;
    --gold-dim:#8a723f;
    --text:#e8edf1;
    --text-dim:#8fa1ad;
    --good:#4caf87;
    --warn:#d97757;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
    background:
      radial-gradient(circle at 20% 0%, #182430 0%, transparent 45%),
      var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:32px 16px 60px;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
  }
  header{
    text-align:center;
    margin-bottom:28px;
  }
  .eyebrow{
    letter-spacing:.25em;
    font-size:11px;
    color:var(--gold);
    text-transform:uppercase;
  }
  h1{
    font-size:26px;
    margin:8px 0 6px;
    font-weight:600;
    letter-spacing:.02em;
  }
  .sub{
    color:var(--text-dim);
    font-size:13px;
    line-height:1.6;
  }
  .card{
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);
    border-radius:14px;
    padding:24px 22px;
    box-shadow:0 20px 40px -20px rgba(0,0,0,.6);
  }
  .field{
    margin-bottom:16px;
  }
  .field label{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-size:13px;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  .field label .sym{
    color:var(--gold);
    font-weight:600;
    font-size:14px;
    letter-spacing:.02em;
  }
  .field label .desc{
    font-size:11px;
    color:var(--text-dim);
  }
  .field input{
    width:100%;
    background:#0d151c;
    border:1px solid var(--line);
    border-radius:8px;
    padding:11px 12px;
    font-size:15px;
    color:var(--text);
    transition:border-color .15s, box-shadow .15s;
  }
  .field input:focus{
    outline:none;
    border-color:var(--gold-dim);
    box-shadow:0 0 0 3px rgba(201,161,90,.12);
  }
  .field input::placeholder{
    color:#4b5a65;
  }
  .field.unknown input{
    border-color:var(--gold);
    background:#1a1409;
  }
  .rate-row{
    display:flex;
    gap:8px;
    align-items:center;
  }
  .rate-row input{flex:1;}
  .rate-row .unit{
    font-size:12px;
    color:var(--text-dim);
    white-space:nowrap;
  }
  .hint{
    font-size:11.5px;
    color:var(--text-dim);
    margin-top:8px;
    line-height:1.6;
  }
  .divider{
    height:1px;
    background:var(--line);
    margin:20px 0;
  }
  button.calc{
    width:100%;
    padding:14px;
    border:none;
    border-radius:9px;
    background:linear-gradient(180deg,#d7b06d,#b8863f);
    color:#1b1206;
    font-size:15px;
    font-weight:700;
    letter-spacing:.03em;
    cursor:pointer;
    transition:transform .12s, filter .12s;
  }
  button.calc:hover{filter:brightness(1.06);}
  button.calc:active{transform:scale(0.99);}
  button.reset{
    width:100%;
    margin-top:10px;
    padding:11px;
    border:1px solid var(--line);
    border-radius:9px;
    background:transparent;
    color:var(--text-dim);
    font-size:13px;
    cursor:pointer;
  }
  button.reset:hover{color:var(--text); border-color:var(--gold-dim);}

  #result{
    margin-top:20px;
  }
  .result-box{
    border:1px solid var(--gold-dim);
    background:rgba(201,161,90,.07);
    border-radius:10px;
    padding:18px 18px;
    animation:rise .25s ease;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }
  .result-label{
    font-size:12px;
    color:var(--gold);
    letter-spacing:.1em;
    text-transform:uppercase;
  }
  .result-value{
    font-size:30px;
    font-weight:700;
    margin:6px 0 4px;
    font-variant-numeric:tabular-nums;
  }
  .result-formula{
    font-size:12px;
    color:var(--text-dim);
    font-family:"SFMono-Regular",Consolas,monospace;
  }
  .error-box{
    border:1px solid var(--warn);
    background:rgba(217,119,87,.08);
    border-radius:10px;
    padding:16px 18px;
    color:#f0b8a4;
    font-size:13.5px;
    line-height:1.7;
  }
  footer{
    text-align:center;
    margin-top:24px;
    font-size:11px;
    color:#4b5a65;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Compound Interest &amp; Annuity</div>
    <h1>投資の経済計算</h1>
    <div class="sub">現価・終価・年価・年利率・年数のうち、求めたい 1 項目だけを<br>空欄にして「計算する」を押してください。</div>
  </header>

  <div class="card">
    <div class="field" id="f-P">
      <label><span class="sym">現価 P</span><span class="desc">Present Value（元本・現在の価値）</span></label>
      <input type="text" id="P" inputmode="decimal" placeholder="例）1000000">
    </div>

    <div class="field" id="f-S">
      <label><span class="sym">終価 S</span><span class="desc">Future Value（将来の価値）</span></label>
      <input type="text" id="S" inputmode="decimal" placeholder="例）1500000">
    </div>

    <div class="field" id="f-M">
      <label><span class="sym">年価 M</span><span class="desc">Annuity（毎年の積立額・年金額）</span></label>
      <input type="text" id="M" inputmode="decimal" placeholder="例）100000">
    </div>

    <div class="field" id="f-i">
      <label><span class="sym">年利率 i</span><span class="desc">Annual Rate</span></label>
      <div class="rate-row">
        <input type="text" id="i" inputmode="decimal" placeholder="例）3（%）">
        <span class="unit">%</span>
      </div>
    </div>

    <div class="field" id="f-n">
      <label><span class="sym">年数 n</span><span class="desc">Number of Years</span></label>
      <input type="text" id="n" inputmode="decimal" placeholder="例）10">
    </div>

    <div class="divider"></div>

    <button class="calc" onclick="calculate()">計算する</button>
    <button class="reset" onclick="resetAll()">すべてクリア</button>

    <div id="result"></div>

    <div class="hint">
      ・単利ではなく複利（元利均等の年金現価・年金終価）で計算します。<br>
      ・P・S・M の 3 つの元本系の値のうち、n・i は必須です。<br>
      ・年利率は「3」と入力すると 3%（=0.03）として計算します。
    </div>
  </div>

  <footer>投資の経済計算 &mdash; Scratch版から移植</footer>
</div>

<script>
const ids = ['P','S','M','i','n'];

function resetAll(){
  ids.forEach(id => document.getElementById(id).value = '');
  document.getElementById('result').innerHTML = '';
  ids.forEach(id => document.getElementById('f-'+id).classList.remove('unknown'));
}

function parseVal(id){
  const raw = document.getElementById(id).value.trim();
  if(raw === '') return null;
  const num = Number(raw);
  return isNaN(num) ? null : num;
}

function fmt(num){
  if(!isFinite(num)) return '計算不可（値を確認してください）';
  // 金額はカンマ区切り、小数は必要な分だけ
  const rounded = Math.round(num * 100) / 100;
  return rounded.toLocaleString('ja-JP', {maximumFractionDigits:2});
}

function calculate(){
  ids.forEach(id => document.getElementById('f-'+id).classList.remove('unknown'));

  let P = parseVal('P');
  let S = parseVal('S');
  let M = parseVal('M');
  let iPercent = parseVal('i');
  let i = (iPercent === null) ? null : iPercent / 100;
  let n = parseVal('n');

  const blanks = [];
  if(P === null) blanks.push('P');
  if(S === null) blanks.push('S');
  if(M === null) blanks.push('M');
  if(i === null) blanks.push('i');
  if(n === null) blanks.push('n');

  const resultDiv = document.getElementById('result');

  if(blanks.length === 0){
    resultDiv.innerHTML = `<div class="error-box">求めたい項目を 1 つ、空欄のままにしてください。（現在すべて入力されています）</div>`;
    return;
  }
  if(blanks.length > 1){
    resultDiv.innerHTML = `<div class="error-box">空欄が ${blanks.length} 個あります（${blanks.join('・')}）。求めたい 1 項目だけを空欄にしてください。</div>`;
    return;
  }

  const target = blanks[0];
  document.getElementById('f-'+target).classList.add('unknown');

  let value = null, formula = '', label = '', usedCase = '';

  // べき乗 = (1+i)^n（元のScratchの「べき乗」カスタムブロックに相当）
  const pow = (i !== null && n !== null) ? Math.pow(1+i, n) : null;

  if(target === 'P'){
    label = '現価 P';
    // Scratch側は S→P（一括） の後に M→P（年金） を評価し、両方成立する場合は
    // 年金側（M）の結果で上書きされる。その優先順位をそのまま再現する。
    if(S !== null && n !== null && i !== null){
      value = S / pow;
      formula = 'P = S / (1+i)ⁿ　【一括：終価から逆算】';
      usedCase = 'lump';
    }
    if(M !== null && n !== null && i !== null){
      value = (pow - 1) * (M / (i * pow));
      formula = 'P = M・[(1+i)ⁿ−1] / [i・(1+i)ⁿ]　【年金現価】';
      usedCase = 'annuity';
    }
    if(value === null){
      resultDiv.innerHTML = errBox('P を求めるには「n・i」に加えて「S」または「M」が必要です。');
      return;
    }
  }
  else if(target === 'S'){
    label = '終価 S';
    if(P !== null && n !== null && i !== null){
      value = pow * P;
      formula = 'S = P・(1+i)ⁿ　【一括：現価から複利計算】';
    }
    if(M !== null && n !== null && i !== null){
      value = ((pow * (P !== null ? P : 0)) - 1) * (M / i);
      formula = 'S = [(1+i)ⁿ・P − 1]・(M / i)　【年金終価（元のScratch定義どおり）】';
    }
    if(value === null){
      resultDiv.innerHTML = errBox('S を求めるには「n・i」に加えて「P」または「M」が必要です。');
      return;
    }
  }
  else if(target === 'M'){
    label = '年価 M';
    if(S !== null && n !== null && i !== null){
      value = (i * S) / (pow - 1);
      formula = 'M = i・S / [(1+i)ⁿ−1]　【減債基金：目標額Sに必要な積立額】';
    }
    if(P !== null && n !== null && i !== null){
      value = (pow * i) * (P / (pow - 1));
      formula = 'M = i・(1+i)ⁿ・P / [(1+i)ⁿ−1]　【資本回収：元本Pの返済（年金）額】';
    }
    if(value === null){
      resultDiv.innerHTML = errBox('M を求めるには「n・i」に加えて「S」または「P」が必要です。');
      return;
    }
  }
  else if(target === 'n'){
    label = '年数 n';
    if(S !== null && P !== null && i !== null){
      value = Math.log(S / P) / Math.log(1 + i);
      formula = 'n = log(S/P) / log(1+i)　【一括】';
    }
    if(S !== null && M !== null && i !== null){
      value = Math.log(((S * i) / M) + 1) / Math.log(1 + i);
      formula = 'n = log((S・i/M)+1) / log(1+i)　【年金】';
    }
    if(value === null){
      resultDiv.innerHTML = errBox('n を求めるには「S・i」に加えて「P」または「M」が必要です。');
      return;
    }
    value = Math.ceil(value); // 元のScratchと同様、年数は切り上げ
  }
  else if(target === 'i'){
    label = '年利率 i';
    if(S !== null && P !== null && n !== null){
      const root = Math.pow(S / P, 1 / n);
      value = (root - 1) * 100; // %表示
      formula = 'i = [(S/P)^(1/n) − 1]　【S・P・nから逆算】';
    }
    if(value === null){
      resultDiv.innerHTML = errBox('i を求めるには「S・P・n」がすべて必要です。');
      return;
    }
  }

  const displayValue = (target === 'i') ? (Math.round(value*10000)/10000) + ' %'
                      : (target === 'n') ? Math.round(value) + ' 年'
                      : fmt(value);

  resultDiv.innerHTML = `
    <div class="result-box">
      <div class="result-label">${label}</div>
      <div class="result-value">${displayValue}</div>
      <div class="result-formula">${formula}</div>
    </div>
  `;
}

function errBox(msg){
  return `<div class="error-box">${msg}</div>`;
}
</script>
</body>
</html>
